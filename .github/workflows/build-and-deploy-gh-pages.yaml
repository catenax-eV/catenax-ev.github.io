name: Deploy to GitHub Pages

on:
  push:
    branches:
      - '**'

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set deploy destination
        id: dest
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dir=." >> $GITHUB_OUTPUT
            echo "base_url=/" >> $GITHUB_OUTPUT
          else
            BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
            echo "dir=branch/${BRANCH}" >> $GITHUB_OUTPUT
            echo "base_url=/branch/${BRANCH}/" >> $GITHUB_OUTPUT
          fi

      - name: Build website
        run: npm run build
        env:
          BASE_URL: ${{ steps.dest.outputs.base_url }}

      # Popular action to deploy to GitHub Pages:
      # Docs: https://github.com/peaceiris/actions-gh-pages#%EF%B8%8F-docusaurus
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Build output to publish to the `gh-pages` branch:
          publish_dir: ./build
          destination_dir: ${{ steps.dest.outputs.dir }}
          keep_files: true
          # The following lines assign commit authorship to the official
          # GH-Actions bot for deploys to `gh-pages` branch:
          # https://github.com/actions/checkout/issues/13#issuecomment-724415212
          # The GH actions bot is used by default if you didn't specify the two fields.
          # You can swap them out with your own user credentials.
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Comment branch URL on PR
        if: github.ref_name != 'main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_URL="https://catenax-ev.github.io${{ steps.dest.outputs.base_url }}"
          PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch ${{ github.ref_name }}, skipping comment."
            exit 0
          fi

          COMMENT_MARKER="<!-- branch-url-comment -->"
          COMMENT_BODY="${COMMENT_MARKER}
          ## 🌿 Branch Deployment

          Your changes have been deployed to the branch environment:

          🌐 **Branch URL:** ${BRANCH_URL}

          > This comment is updated automatically on every push to this branch."

          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${COMMENT_MARKER}\")) | .id" | head -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="${COMMENT_BODY}"
          else
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -X POST -f body="${COMMENT_BODY}"
          fi
