name: Generate Standards Output

on:
  workflow_dispatch:

jobs:
  generate:
    name: Parse standards and open PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install gray-matter
        run: npm install gray-matter
        working-directory: .github/scripts

      - name: Run standards parser
        run: node .github/scripts/generateStandardsOutput.js "${{ github.workspace }}"

      - name: Create output branch and push
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="standards-output/$(date -u +%Y%m%d-%H%M%S)"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"
          git add static/outputs/standards-graph-data.json
          git commit -m "chore: update standards graph output"
          git push origin "${BRANCH}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore: update standards graph output" \
            --body "Automated PR generated by the **Generate Standards Output** workflow.

          Parses \`docs/standards\` and writes the resulting graph data to \`static/outputs/standards-graph-data.json\`." \
