name: Clean up branch preview

on:
  delete:

jobs:
  cleanup:
    name: Remove preview folder for deleted branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run for branch deletions (not tag deletions)
    if: github.event.ref_type == 'branch' && github.event.ref != 'main'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview folder
        run: |
          BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          PREVIEW_DIR="preview/${BRANCH}"
          if [ -d "${PREVIEW_DIR}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -rf "${PREVIEW_DIR}"
            git commit -m "chore: remove preview for deleted branch ${BRANCH}"
            git push
          else
            echo "No preview folder found at ${PREVIEW_DIR}, nothing to clean up."
          fi
