name: Clean up branch deployment

on:
  delete:

jobs:
  cleanup:
    name: Remove branch folder for deleted branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run for branch deletions (not tag deletions).
    # In the `delete` event, github.event.ref is the bare branch name (e.g. "main"),
    # not the full ref like "refs/heads/main".
    if: github.event.ref_type == 'branch' && github.event.ref != 'main'
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove branch folder
        run: |
          BRANCH=$(echo "${{ github.event.ref }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          BRANCH_DIR="branch/${BRANCH}"
          if [ -d "${BRANCH_DIR}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git rm -rf "${BRANCH_DIR}"
            git commit -m "chore: remove branch deployment for deleted branch ${BRANCH}"
            git push
          else
            echo "No branch folder found at ${BRANCH_DIR}, nothing to clean up."
          fi
